
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
#app{width:100%;min-height:600px;padding:1rem 0}
#header{text-align:center;margin-bottom:1rem}
#header h1{font-size:20px;font-weight:500;color:var(--color-text-primary)}
#header p{font-size:14px;color:var(--color-text-secondary);margin-top:4px}
#main{display:grid;grid-template-columns:1fr 320px;gap:1rem;align-items:start}
#canvas-wrap{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;position:relative;height:380px}
canvas#three{width:100%;height:100%;display:block}
#controls{font-size:13px;color:var(--color-text-secondary);text-align:center;padding:6px 0 8px;position:absolute;bottom:0;width:100%}
#panel{display:flex;flex-direction:column;gap:10px}
#solids-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.solid-btn{padding:10px 8px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);cursor:pointer;text-align:center;transition:all .15s;color:var(--color-text-primary)}
.solid-btn:hover{background:var(--color-background-secondary);border-color:var(--color-border-secondary)}
.solid-btn.active{border:2px solid #185FA5;background:#E6F1FB;color:#0C447C}
.solid-btn .icon{font-size:22px;display:block;margin-bottom:3px}
.solid-btn .name{font-size:12px;font-weight:500}
#info-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem}
#info-card h2{font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px}
#formula-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;margin-bottom:10px}
#formula-box p{font-size:13px;color:var(--color-text-secondary);margin-bottom:4px}
#formula-box .formula{font-size:14px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono)}
#slider-section label{font-size:13px;color:var(--color-text-secondary);display:flex;justify-content:space-between;margin-bottom:4px}
#slider-section input[type=range]{width:100%;margin-bottom:8px}
#result-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px}
.metric .lbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px}
.metric .val{font-size:18px;font-weight:500;color:var(--color-text-primary)}
#quiz-section{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem}
#quiz-section h2{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px}
#q-text{font-size:14px;color:var(--color-text-primary);margin-bottom:10px;min-height:40px}
#q-options{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.opt-btn{padding:8px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);cursor:pointer;font-size:13px;color:var(--color-text-primary);transition:all .15s}
.opt-btn:hover{background:var(--color-background-secondary)}
.opt-btn.correct{background:#EAF3DE;border-color:#639922;color:#27500A}
.opt-btn.wrong{background:#FCEBEB;border-color:#A32D2D;color:#501313}
#q-feedback{font-size:13px;min-height:18px;margin-bottom:8px;font-weight:500}
#q-feedback.ok{color:#3B6D11}
#q-feedback.fail{color:#A32D2D}
#score-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--color-text-secondary)}
#next-btn{padding:6px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);cursor:pointer;font-size:13px;color:var(--color-text-primary)}
#next-btn:hover{background:var(--color-background-secondary)}
@media(max-width:640px){#main{grid-template-columns:1fr}#canvas-wrap{height:260px}}
</style>

<div id="app">
  <div id="header">
    <h1>Sólidos geométricos — Grado 7°</h1>
    <p>Explora figuras en 3D, calcula volumen y área, ¡y pon a prueba tu conocimiento!</p>
  </div>
  <div id="main">
    <div id="canvas-wrap">
      <canvas id="three"></canvas>
      <div id="controls">Arrastra para rotar · Scroll para zoom</div>
    </div>
    <div id="panel">
      <div id="solids-grid">
        <button class="solid-btn active" onclick="selectSolid('cubo')"><span class="icon">⬛</span><span class="name">Cubo</span></button>
        <button class="solid-btn" onclick="selectSolid('esfera')"><span class="icon">🔵</span><span class="name">Esfera</span></button>
        <button class="solid-btn" onclick="selectSolid('cilindro')"><span class="icon">🟤</span><span class="name">Cilindro</span></button>
        <button class="solid-btn" onclick="selectSolid('piramide')"><span class="icon">🔺</span><span class="name">Pirámide</span></button>
      </div>
      <div id="info-card">
        <h2 id="solid-name">Cubo</h2>
        <div id="formula-box">
          <p>Volumen</p>
          <div class="formula" id="f-vol">V = a³</div>
          <p style="margin-top:6px">Área superficial</p>
          <div class="formula" id="f-area">A = 6a²</div>
        </div>
        <div id="slider-section">
          <label><span id="param-label">Arista (a)</span><span id="param-val">3</span></label>
          <input type="range" id="param-slider" min="1" max="6" step="0.5" value="3" oninput="updateCalc(this.value)">
          <label><span id="param2-label" style="display:none">Altura (h)</span><span id="param2-val" style="display:none">4</span></label>
          <input type="range" id="param2-slider" min="1" max="8" step="0.5" value="4" oninput="updateCalc2(this.value)" style="display:none">
        </div>
        <div id="result-row">
          <div class="metric"><div class="lbl">Volumen</div><div class="val" id="res-vol">27 u³</div></div>
          <div class="metric"><div class="lbl">Área</div><div class="val" id="res-area">54 u²</div></div>
        </div>
      </div>
    </div>
  </div>
  <div id="quiz-section" style="margin-top:1rem">
    <h2>Preguntas rápidas</h2>
    <div id="q-text"></div>
    <div id="q-options"></div>
    <div id="q-feedback"></div>
    <div id="score-row">
      <span id="score-txt">Puntaje: 0 / 0</span>
      <button id="next-btn" onclick="nextQuestion()">Siguiente →</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const DATA = {
  cubo:{
    name:'Cubo',
    fVol:'V = a³',
    fArea:'A = 6a²',
    p1:'Arista (a)',p1min:1,p1max:6,p1def:3,
    p2:null,
    vol:(a,h)=>a*a*a,
    area:(a,h)=>6*a*a,
    geo:(a,h)=>new THREE.BoxGeometry(a,a,a),
    color:0x378ADD
  },
  esfera:{
    name:'Esfera',
    fVol:'V = (4/3)·π·r³',
    fArea:'A = 4·π·r²',
    p1:'Radio (r)',p1min:0.5,p1max:4,p1def:2,
    p2:null,
    vol:(r)=>(4/3)*Math.PI*r*r*r,
    area:(r)=>4*Math.PI*r*r,
    geo:(r)=>new THREE.SphereGeometry(r,32,32),
    color:0x1D9E75
  },
  cilindro:{
    name:'Cilindro',
    fVol:'V = π·r²·h',
    fArea:'A = 2π·r·(r+h)',
    p1:'Radio (r)',p1min:0.5,p1max:4,p1def:2,
    p2:'Altura (h)',p2min:1,p2max:8,p2def:4,
    vol:(r,h)=>Math.PI*r*r*h,
    area:(r,h)=>2*Math.PI*r*(r+h),
    geo:(r,h)=>new THREE.CylinderGeometry(r,r,h,32),
    color:0xD85A30
  },
  piramide:{
    name:'Pirámide cuadrada',
    fVol:'V = (1/3)·a²·h',
    fArea:'A = a² + 2·a·l',
    p1:'Base (a)',p1min:1,p1max:6,p1def:3,
    p2:'Altura (h)',p2min:1,p2max:8,p2def:4,
    vol:(a,h)=>(1/3)*a*a*h,
    area:(a,h)=>a*a+2*a*Math.sqrt((a/2)*(a/2)+h*h),
    geo:(a,h)=>{
      const g=new THREE.ConeGeometry(a*0.7,h,4);
      return g;
    },
    color:0xBA7517
  }
};

const QUESTIONS=[
  {q:'¿Cuál es el volumen de un cubo con arista de 4 cm?',opts:['64 cm³','48 cm³','96 cm³','16 cm³'],ans:0},
  {q:'¿Cómo se llama la distancia desde el centro de una esfera hasta su superficie?',opts:['Diámetro','Radio','Arista','Altura'],ans:1},
  {q:'Un cilindro tiene r = 2 y h = 5. ¿Cuál es su volumen aproximado?',opts:['62.8 u³','31.4 u³','20 u³','78.5 u³'],ans:0},
  {q:'¿Cuántas caras tiene un cubo?',opts:['4','8','6','12'],ans:2},
  {q:'¿Qué fórmula da el volumen de una pirámide cuadrada?',opts:['a²·h','(1/3)·a²·h','(1/2)·a·h','a³'],ans:1},
  {q:'El área superficial de una esfera con r = 3 es aproximadamente:',opts:['113 u²','28 u²','75 u²','56 u²'],ans:0},
  {q:'¿Cuántos vértices tiene una pirámide de base cuadrada?',opts:['4','6','5','8'],ans:2},
  {q:'Si duplicas la arista de un cubo, ¿cuántas veces aumenta su volumen?',opts:['2 veces','4 veces','8 veces','6 veces'],ans:2},
];

let current='cubo', p1=3, p2=4;
let scene, camera, renderer, mesh, animId;
let qIdx=0, score=0, total=0, answered=false;

function initThree(){
  scene=new THREE.Scene();
  scene.background=null;
  camera=new THREE.PerspectiveCamera(45,1,0.1,100);
  camera.position.set(6,5,8);
  camera.lookAt(0,0,0);
  const canvas=document.getElementById('three');
  renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  const wrap=document.getElementById('canvas-wrap');
  function resize(){
    const w=wrap.clientWidth, h=wrap.clientHeight-28;
    renderer.setSize(w,h);
    camera.aspect=w/h;
    camera.updateProjectionMatrix();
  }
  resize();
  new ResizeObserver(resize).observe(wrap);
  const ambient=new THREE.AmbientLight(0xffffff,0.6);
  scene.add(ambient);
  const dir=new THREE.DirectionalLight(0xffffff,0.9);
  dir.position.set(5,10,7);
  scene.add(dir);
  const dir2=new THREE.DirectionalLight(0xaaddff,0.3);
  dir2.position.set(-5,-5,-5);
  scene.add(dir2);
  buildMesh();
  addGridHelper();
  setupOrbit(canvas);
  animate();
}

function addGridHelper(){
  const grid=new THREE.GridHelper(12,12,0x888888,0xcccccc);
  grid.position.y=-3;
  grid.material.opacity=0.3;
  grid.material.transparent=true;
  scene.add(grid);
}

function buildMesh(){
  if(mesh){scene.remove(mesh);mesh.geometry.dispose();mesh.material.dispose();}
  const d=DATA[current];
  const geo=d.geo(p1,p2);
  const mat=new THREE.MeshPhongMaterial({color:d.color,shininess:80,transparent:true,opacity:0.92});
  mesh=new THREE.Mesh(geo,mat);
  const edges=new THREE.EdgesGeometry(geo);
  const line=new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0xffffff,opacity:0.3,transparent:true}));
  mesh.add(line);
  scene.add(mesh);
}

let isDragging=false,prevX=0,prevY=0,rotX=0.4,rotY=0;
function setupOrbit(canvas){
  canvas.addEventListener('mousedown',e=>{isDragging=true;prevX=e.clientX;prevY=e.clientY});
  window.addEventListener('mouseup',()=>isDragging=false);
  window.addEventListener('mousemove',e=>{
    if(!isDragging)return;
    const dx=e.clientX-prevX, dy=e.clientY-prevY;
    rotY+=dx*0.01; rotX+=dy*0.01;
    prevX=e.clientX; prevY=e.clientY;
  });
  canvas.addEventListener('wheel',e=>{
    camera.position.multiplyScalar(e.deltaY>0?1.1:0.9);
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchstart',e=>{isDragging=true;prevX=e.touches[0].clientX;prevY=e.touches[0].clientY},{passive:true});
  canvas.addEventListener('touchend',()=>isDragging=false,{passive:true});
  canvas.addEventListener('touchmove',e=>{
    if(!isDragging)return;
    const dx=e.touches[0].clientX-prevX, dy=e.touches[0].clientY-prevY;
    rotY+=dx*0.01; rotX+=dy*0.01;
    prevX=e.touches[0].clientX; prevY=e.touches[0].clientY;
  },{passive:true});
}

function animate(){
  animId=requestAnimationFrame(animate);
  if(mesh){
    if(!isDragging){rotY+=0.005;}
    mesh.rotation.x=rotX;
    mesh.rotation.y=rotY;
  }
  renderer.render(scene,camera);
}

function selectSolid(key){
  current=key;
  const d=DATA[key];
  p1=d.p1def; p2=d.p2def||4;
  document.querySelectorAll('.solid-btn').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('solid-name').textContent=d.name;
  document.getElementById('f-vol').textContent=d.fVol;
  document.getElementById('f-area').textContent=d.fArea;
  document.getElementById('param-label').textContent=d.p1;
  const sl=document.getElementById('param-slider');
  sl.min=d.p1min; sl.max=d.p1max; sl.step=0.5; sl.value=p1;
  document.getElementById('param-val').textContent=p1;
  const sl2=document.getElementById('param2-slider');
  const lbl2=document.getElementById('param2-label');
  const val2=document.getElementById('param2-val');
  if(d.p2){
    lbl2.style.display=''; val2.style.display='';
    sl2.style.display=''; sl2.min=d.p2min; sl2.max=d.p2max; sl2.step=0.5; sl2.value=p2;
    document.getElementById('param2-label').textContent=d.p2;
    val2.textContent=p2;
  } else {
    lbl2.style.display='none'; val2.style.display='none'; sl2.style.display='none';
  }
  computeAndShow();
  buildMesh();
}

function updateCalc(v){
  p1=parseFloat(v);
  document.getElementById('param-val').textContent=(+v).toFixed(1).replace('.0','');
  computeAndShow(); buildMesh();
}
function updateCalc2(v){
  p2=parseFloat(v);
  document.getElementById('param2-val').textContent=(+v).toFixed(1).replace('.0','');
  computeAndShow(); buildMesh();
}

function computeAndShow(){
  const d=DATA[current];
  const vol=d.vol(p1,p2);
  const area=d.area(p1,p2);
  document.getElementById('res-vol').textContent=vol.toFixed(1)+' u³';
  document.getElementById('res-area').textContent=area.toFixed(1)+' u²';
}

function shuffleQuestions(){
  for(let i=QUESTIONS.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [QUESTIONS[i],QUESTIONS[j]]=[QUESTIONS[j],QUESTIONS[i]];
  }
}

function renderQuestion(){
  const q=QUESTIONS[qIdx%QUESTIONS.length];
  document.getElementById('q-text').textContent=q.q;
  const wrap=document.getElementById('q-options');
  wrap.innerHTML='';
  answered=false;
  document.getElementById('q-feedback').textContent='';
  document.getElementById('q-feedback').className='';
  q.opts.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='opt-btn';
    b.textContent=opt;
    b.onclick=()=>answer(i,q.ans,b);
    wrap.appendChild(b);
  });
  document.getElementById('score-txt').textContent=`Puntaje: ${score} / ${total}`;
}

function answer(i,correct,btn){
  if(answered)return;
  answered=true; total++;
  const fb=document.getElementById('q-feedback');
  const allBtns=document.querySelectorAll('.opt-btn');
  allBtns[correct].classList.add('correct');
  if(i===correct){
    score++;
    fb.textContent='¡Correcto! Muy bien.';
    fb.className='ok';
  } else {
    btn.classList.add('wrong');
    fb.textContent='Incorrecto. La respuesta correcta está marcada en verde.';
    fb.className='fail';
  }
  document.getElementById('score-txt').textContent=`Puntaje: ${score} / ${total}`;
}

function nextQuestion(){
  qIdx++;
  if(qIdx>=QUESTIONS.length){qIdx=0;shuffleQuestions();}
  renderQuestion();
}

window.selectSolid=selectSolid;
window.updateCalc=updateCalc;
window.updateCalc2=updateCalc2;
window.nextQuestion=nextQuestion;
window.answer=answer;

shuffleQuestions();
initThree();
computeAndShow();
renderQuestion();
</script>
